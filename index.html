<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geliaku's Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --cream-bg:   #F4EEDF;
    --paper:      #FBF7EC;
    --paper-shade:#E6D9B8;
    --gold:       #B68A35;
    --gold-soft:  #D8BD7F;
    --wine:       #6E1E2B;
    --ink:        #352A1E;
    --ink-soft:   #786950;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    height:100%;
    background: radial-gradient(ellipse at top, #FBF6E9 0%, var(--cream-bg) 65%);
    font-family:'Cormorant Garamond', serif;
    color:var(--ink);
    overflow-x:hidden;
  }

  .stage{
    position:relative;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:56px 20px;
  }

  /* ---------- Envelope ---------- */

  .envelope-group{
    display:flex;
    flex-direction:column;
    align-items:center;
    transition: opacity .5s ease;
  }

  .envelope-wrap{
    position:relative;
    width:clamp(270px, 80vw, 360px);
    aspect-ratio: 1.5 / 1;
    perspective:1300px;
    cursor:pointer;
    outline:none;
  }

  .envelope-wrap:not(.open):not(.sent){
    animation: float 4.6s ease-in-out infinite;
  }

  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-7px); }
  }

  .envelope-wrap.sent{
    opacity:0;
    transform:scale(.82) translateY(-14px);
    transition: opacity .6s ease .1s, transform .6s ease .1s;
    pointer-events:none;
  }

  .envelope-wrap:focus-visible{
    box-shadow: 0 0 0 3px var(--paper), 0 0 0 5px var(--gold);
    border-radius:8px;
  }

  .env-back{
    position:absolute; inset:0;
    border-radius:6px;
    background:var(--paper-shade);
    box-shadow:
      0 26px 55px -14px rgba(70,45,15,.40),
      0 6px 14px rgba(70,45,15,.16);
    z-index:1;
  }

  .peek{
    position:absolute;
    left:9%; right:9%;
    bottom:44%;
    height:44%;
    background:var(--paper);
    border-radius:4px 4px 0 0;
    box-shadow:0 -2px 10px rgba(70,45,15,.08);
    opacity:0;
    transform:translateY(0);
    transition: opacity .45s ease .55s, transform .55s ease .55s;
    z-index:2;
  }

  .pocket{
    position:absolute;
    left:0; right:0; bottom:0;
    height:62%;
    clip-path: polygon(0 100%, 100% 100%, 50% 10%);
    background: linear-gradient(160deg, var(--paper) 0%, var(--paper-shade) 100%);
    z-index:3;
  }

  .flap{
    position:absolute;
    left:0; right:0; top:0;
    height:54%;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    background: linear-gradient(205deg, var(--paper) 0%, var(--paper-shade) 100%);
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform .68s cubic-bezier(.45,0,.2,1);
    box-shadow: 0 2px 6px rgba(70,45,15,.10);
    backface-visibility:hidden;
    z-index:4;
  }

  .seal{
    position:absolute;
    top:54%; left:50%;
    width:clamp(44px,12vw,56px);
    height:clamp(44px,12vw,56px);
    transform:translate(-50%,-50%);
    border-radius:50%;
    border:2px solid var(--gold-soft);
    background: radial-gradient(circle at 35% 30%, #8e2a39, var(--wine) 62%, #4c1219 100%);
    box-shadow: 0 4px 10px rgba(0,0,0,.28), inset 0 1px 2px rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center;
    font-family:'Pinyon Script', cursive;
    font-size:1.5rem;
    color:var(--gold-soft);
    z-index:5;
    transition: transform .4s ease, opacity .35s ease;
  }

  .envelope-wrap.open .flap{
    transform: rotateX(-178deg);
    transition-delay:.22s;
  }
  .envelope-wrap.open .seal{
    transform:translate(-50%,-50%) scale(1.3) rotate(14deg);
    opacity:0;
  }
  .envelope-wrap.open .peek{
    opacity:1;
    transform:translateY(-48%);
  }

  .hint{
    margin-top:1.5rem;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:.24em;
    font-size:.78rem;
    color:var(--ink-soft);
    transition:opacity .4s ease;
  }
  .hint.hide{ opacity:0; }

  /* ---------- Invitation ---------- */

  .invitation{
    position:absolute;
    left:50%; top:50%;
    width:min(440px, 90vw);
    transform: translate(-50%,-50%) translateY(18px) scale(.96);
    opacity:0;
    pointer-events:none;
    transition: opacity .75s ease, transform .75s ease;
    z-index:10;
  }
  .invitation.show{
    opacity:1;
    transform: translate(-50%,-50%) translateY(0) scale(1);
    pointer-events:auto;
  }

  .invitation-card{
    position:relative;
    background:var(--paper);
    border:1px solid rgba(182,138,53,.35);
    border-radius:4px;
    padding:3.2rem 2.1rem 2.7rem;
    text-align:center;
    overflow:hidden;
    box-shadow:
      0 35px 70px -18px rgba(70,45,15,.38),
      0 12px 28px rgba(70,45,15,.16);
  }

  .invitation-card::before{
    content:'';
    position:absolute;
    inset:10px;
    border:1px solid rgba(182,138,53,.45);
    pointer-events:none;
  }

  .invitation-content{ position:relative; z-index:1; }

  .eyebrow{
    margin:0 0 .9rem;
    text-transform:uppercase;
    letter-spacing:.32em;
    font-size:.78rem;
    color:var(--gold);
  }

  .name{
    margin:0 0 .3rem;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(2.6rem, 10vw, 3.6rem);
    line-height:1;
    letter-spacing:.01em;
    color:var(--wine);
  }
  .name .cap{
    font-family:'Pinyon Script', cursive;
    font-style:normal;
    font-weight:400;
    font-size:1.7em;
    line-height:0;
    display:inline-block;
    transform:translateY(.08em);
    margin-right:-.02em;
  }

  .subtitle{
    margin:0 0 .3rem;
    font-style:italic;
    font-size:1.12rem;
    color:var(--ink-soft);
  }
  .subtitle .accent{
    font-style:normal;
    color:var(--gold);
  }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    width:58%;
    margin:1.5rem auto;
  }
  .divider::before, .divider::after{
    content:'';
    flex:1;
    height:1px;
    background: linear-gradient(to var(--dir, right), transparent, var(--gold), transparent);
  }
  .divider .diamond{
    width:6px; height:6px;
    background:var(--gold);
    transform:rotate(45deg);
    flex-shrink:0;
  }

  .detail{ margin:1.15rem 0; }
  .detail .label{
    display:block;
    text-transform:uppercase;
    letter-spacing:.24em;
    font-size:.72rem;
    color:var(--gold);
    margin-bottom:.3rem;
  }
  .detail .value{
    display:block;
    font-size:1.22rem;
    color:var(--ink);
    line-height:1.45;
  }

  .closing{
    margin:1.7rem 0 0;
    font-style:italic;
    font-size:1.02rem;
    color:var(--ink-soft);
  }

  @media (prefers-reduced-motion: reduce){
    *{
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
    }
  }

  /* ---------- Sound toggle ---------- */

  .sound-toggle{
    position:fixed;
    bottom:22px; right:22px;
    width:42px; height:42px;
    border-radius:50%;
    border:1.5px solid var(--gold-soft);
    background:var(--paper);
    color:var(--wine);
    font-size:1.1rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(70,45,15,.22);
    opacity:0;
    transform:translateY(8px);
    pointer-events:none;
    transition:opacity .5s ease, transform .5s ease;
    z-index:20;
  }
  .sound-toggle.visible{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .sound-toggle.muted{
    color:var(--ink-soft);
  }
  .sound-toggle:focus-visible{
    box-shadow:0 0 0 3px var(--paper), 0 0 0 5px var(--gold);
  }
</style>
</head>
<body>

<div class="stage">

  <audio id="bgMusic" src="song.mp3" preload="auto" loop></audio>

  <button class="sound-toggle" id="soundToggle" aria-label="Mute music" aria-hidden="true">&#9834;</button>

  <div class="envelope-group" id="envelopeGroup">
    <div class="envelope-wrap" id="envelope" role="button" tabindex="0" aria-label="Open the invitation">
      <div class="env-back"></div>
      <div class="peek"></div>
      <div class="pocket"></div>
      <div class="flap" id="flap">
        <div class="seal" id="seal" aria-hidden="true">G</div>
      </div>
    </div>
    <p class="hint" id="hint">tap the seal to open</p>
  </div>

  <div class="invitation" id="invitation" aria-hidden="true">
    <div class="invitation-card">
      <div class="invitation-content">
        <p class="eyebrow">You're Invited</p>
        <h1 class="name"><span class="cap">G</span>eliaku</h1>
        <p class="subtitle">is celebrating her <span class="accent">birthday</span></p>

        <div class="divider"><span class="diamond"></span></div>

        <div class="detail">
          <span class="label">Date</span>
          <span class="value">Monday, July 6th, 2026</span>
        </div>
        <div class="detail">
          <span class="label">Time</span>
          <span class="value">4:00 in the afternoon</span>
        </div>
        <div class="detail">
          <span class="label">Place</span>
          <span class="value">8 Knightsdale Road<br>Ipswich, Suffolk &middot; IP1 4JQ</span>
        </div>

        <div class="divider"><span class="diamond"></span></div>

        <p class="closing">Come raise a glass and celebrate the occasion.</p>
      </div>
    </div>
  </div>

</div>

<script>
  const envelope = document.getElementById('envelope');
  const envelopeGroup = document.getElementById('envelopeGroup');
  const invitation = document.getElementById('invitation');
  const hint = document.getElementById('hint');
  const bgMusic = document.getElementById('bgMusic');
  const soundToggle = document.getElementById('soundToggle');
  let opened = false;

  function openInvitation(){
    if(opened) return;
    opened = true;

    envelope.classList.add('open');
    hint.classList.add('hide');

    bgMusic.currentTime = 0;
    bgMusic.play().catch(() => {
      /* Autoplay was blocked — the toggle button still lets them start it manually. */
    });

    setTimeout(() => {
      invitation.classList.add('show');
      soundToggle.classList.add('visible');
      soundToggle.setAttribute('aria-hidden', 'false');
    }, 560);

    setTimeout(() => {
      envelope.classList.add('sent');
    }, 720);

    setTimeout(() => {
      envelopeGroup.style.opacity = '0';
      envelopeGroup.style.pointerEvents = 'none';
    }, 1300);
  }

  envelope.addEventListener('click', openInvitation);
  envelope.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openInvitation();
    }
  });

  soundToggle.addEventListener('click', () => {
    if(bgMusic.paused){
      bgMusic.play().catch(() => {});
      soundToggle.classList.remove('muted');
      soundToggle.innerHTML = '&#9834;';
      soundToggle.setAttribute('aria-label', 'Mute music');
    } else {
      bgMusic.pause();
      soundToggle.classList.add('muted');
      soundToggle.innerHTML = '&#9835;';
      soundToggle.setAttribute('aria-label', 'Play music');
    }
  });
</script>

</body>
</html>
